        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">×</button>
            <h2 id="modalTitle" style="font-size: 24px; font-weight: 700; margin-bottom: 24px;">Add New Recipe</h2>
            <form id="recipeForm" onsubmit="saveRecipe(event)">
                <input type="hidden" id="recipeId">
                
                <div class="form-group">
                    <label>Recipe Name *</label>
                    <input type="text" id="recipeName" required="" placeholder="e.g., Spaghetti Carbonara">
                </div>

                <div class="form-group">
                    <label>Cuisine Type *</label>
                    <select id="cuisineType" required="">
                        <option value="">Select cuisine type</option>
                        <option value="Italian">Italian</option>
                        <option value="Chinese">Chinese</option>
                        <option value="Mexican">Mexican</option>
                        <option value="Indian">Indian</option>
                        <option value="French">French</option>
                        <option value="Japanese">Japanese</option>
                        <option value="Thai">Thai</option>
                        <option value="American">American</option>
                        <option value="Mediterranean">Mediterranean</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="time-inputs">
                    <div class="form-group">
                        <label>Prep Time (minutes) *</label>
                        <input type="number" id="prepTime" required="" min="0" placeholder="15">
                    </div>

                    <div class="form-group">
                        <label>Cook Time (minutes) *</label>
                        <input type="number" id="cookTime" required="" min="0" placeholder="30">
                    </div>
                </div>

                <div class="form-group">
                    <label>Servings *</label>
                    <input type="number" id="servings" required="" min="1" placeholder="4">
                </div>

                <div class="form-group">
                    <label>Image URL (optional)</label>
                    <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg">
                </div>

                <div class="form-group">
                    <label>Ingredients *</label>
                    <div id="ingredientsList"></div>
                    <button type="button" class="add-item-btn" onclick="addIngredientField()">+ Add Ingredient</button>
                </div>

                <div class="form-group">
                    <label>Cooking Instructions *</label>
                    <div id="instructionsList"></div>
                    <button type="button" class="add-item-btn" onclick="addInstructionField()">+ Add Step</button>
                </div>

                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button type="submit" class="btn-primary" style="flex: 1;">Save Recipe</button>
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <button class="close-modal" onclick="closeViewModal()">×</button>
            <div id="viewContent"></div>
        </div>
    </div>

    <script>
        let recipes = JSON.parse(localStorage.getItem(`recipes`)) || [];
        let currentFilter = `all`;

        function saveToLocalStorage() {
            localStorage.setItem(`recipes`, JSON.stringify(recipes));
        }

        function openCreateModal() {
            document.getElementById(`modalTitle`).textContent = `Add New Recipe`;
            document.getElementById(`recipeForm`).reset();
            document.getElementById(`recipeId`).value = ``;
            document.getElementById(`ingredientsList`).innerHTML = ``;
            document.getElementById(`instructionsList`).innerHTML = ``;
            addIngredientField();
            addInstructionField();
            document.getElementById(`recipeModal`).classList.add(`active`);
        }

        function closeModal() {
            document.getElementById(`recipeModal`).classList.remove(`active`);
        }

        function closeViewModal() {
            document.getElementById(`viewModal`).classList.remove(`active`);
        }

        function addIngredientField(value = ``) {
            const container = document.getElementById(`ingredientsList`);
            const div = document.createElement(`div`);
            div.className = `ingredient-item`;
            div.innerHTML = `
                <input type="text" placeholder="e.g., 2 cups flour" value="${value}" required>
                <button type="button" class="remove-item-btn" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(div);
        }

        function addInstructionField(value = ``) {
            const container = document.getElementById(`instructionsList`);
            const div = document.createElement(`div`);
            div.className = `instruction-item`;
            div.innerHTML = `
                <textarea placeholder="Describe this step..." required>${value}</textarea>
                <button type="button" class="remove-item-btn" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(div);
        }

        function saveRecipe(event) {
            event.preventDefault();

            const ingredients = Array.from(document.querySelectorAll(`#ingredientsList input`))
                .map(input => input.value.trim())
                .filter(val => val);

            const instructions = Array.from(document.querySelectorAll(`#instructionsList textarea`))
                .map(textarea => textarea.value.trim())
                .filter(val => val);

            const recipe = {
                id: document.getElementById(`recipeId`).value || Date.now().toString(),
                name: document.getElementById(`recipeName`).value,
                cuisine: document.getElementById(`cuisineType`).value,
                prepTime: parseInt(document.getElementById(`prepTime`).value),
                cookTime: parseInt(document.getElementById(`cookTime`).value),
                servings: parseInt(document.getElementById(`servings`).value),
                imageUrl: document.getElementById(`imageUrl`).value,
                ingredients: ingredients,
                instructions: instructions,
                lastCooked: null,
                comments: [],
                createdAt: new Date().toISOString()
            };

            const existingIndex = recipes.findIndex(r => r.id === recipe.id);
            if (existingIndex >= 0) {
                recipe.lastCooked = recipes[existingIndex].lastCooked;
                recipe.comments = recipes[existingIndex].comments;
                recipe.createdAt = recipes[existingIndex].createdAt;
                recipes[existingIndex] = recipe;
            } else {
                recipes.push(recipe);
            }

            saveToLocalStorage();
            closeModal();
            renderRecipes();
        }

        function editRecipe(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;

            document.getElementById(`modalTitle`).textContent = `Edit Recipe`;
            document.getElementById(`recipeId`).value = recipe.id;
            document.getElementById(`recipeName`).value = recipe.name;
            document.getElementById(`cuisineType`).value = recipe.cuisine;
            document.getElementById(`prepTime`).value = recipe.prepTime;
            document.getElementById(`cookTime`).value = recipe.cookTime;
            document.getElementById(`servings`).value = recipe.servings;
            document.getElementById(`imageUrl`).value = recipe.imageUrl || ``;

            document.getElementById(`ingredientsList`).innerHTML = ``;
            recipe.ingredients.forEach(ing => addIngredientField(ing));

            document.getElementById(`instructionsList`).innerHTML = ``;
            recipe.instructions.forEach(inst => addInstructionField(inst));

            document.getElementById(`recipeModal`).classList.add(`active`);
        }

        function deleteRecipe(id) {
            if (!confirm(`Are you sure you want to delete this recipe?`)) return;
            recipes = recipes.filter(r => r.id !== id);
            saveToLocalStorage();
            renderRecipes();
        }

        function markAsCooked(id) {
            const recipe = recipes.find(r => r.id === id);
            if (recipe) {
                recipe.lastCooked = new Date().toISOString();
                saveToLocalStorage();
                renderRecipes();
            }
        }

        function viewRecipe(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;

            const totalTime = recipe.prepTime + recipe.cookTime;
            const lastCookedText = recipe.lastCooked 
                ? `Last cooked: ${new Date(recipe.lastCooked).toLocaleDateString()}`
                : `Never cooked`;

            let html = `
                <div style="text-align: center; margin-bottom: 24px;">
                    ${recipe.imageUrl ? `<img src="${recipe.imageUrl}" style="width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px; margin-bottom: 16px;">` : ``}
                    <h2 style="font-size: 28px; font-weight: 700; margin-bottom: 8px;">${recipe.name}</h2>
                    <span class="cuisine-badge cuisine-${recipe.cuisine.toLowerCase()}">${recipe.cuisine}</span>
                </div>

                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; text-align: center;">
                    <div style="background: #F9F9F9; padding: 16px; border-radius: 8px;">
                        <div style="font-size: 24px; font-weight: 700; color: #FF6B35;">${recipe.prepTime}</div>
                        <div style="font-size: 12px; color: #666;">Prep Time (min)</div>
                    </div>
                    <div style="background: #F9F9F9; padding: 16px; border-radius: 8px;">
                        <div style="font-size: 24px; font-weight: 700; color: #FF6B35;">${recipe.cookTime}</div>
                        <div style="font-size: 12px; color: #666;">Cook Time (min)</div>
                    </div>
                    <div style="background: #F9F9F9; padding: 16px; border-radius: 8px;">
                        <div style="font-size: 24px; font-weight: 700; color: #FF6B35;">${recipe.servings}</div>
                        <div style="font-size: 12px; color: #666;">Servings</div>
                    </div>
                </div>

                <div style="margin-bottom: 24px;">
                    <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">📝 Ingredients</h3>
                    <ul style="list-style: none; padding: 0;">
                        ${recipe.ingredients.map(ing => `<li style="padding: 8px 0; border-bottom: 1px solid #EEEEEE;">• ${ing}</li>`).join(``)}
                    </ul>
                </div>

                <div style="margin-bottom: 24px;">
                    <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">👨‍🍳 Instructions</h3>
                    <ol style="padding-left: 20px;">
                        ${recipe.instructions.map((inst, i) => `<li style="padding: 8px 0; margin-bottom: 8px;">${inst}</li>`).join(``)}
                    </ol>
                </div>

                <div style="margin-bottom: 24px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <h3 style="font-size: 18px; font-weight: 600;">⏰ Last Cooked</h3>
                        <button class="btn-success" onclick="markAsCooked('${recipe.id}'); viewRecipe('${recipe.id}')">Mark as Cooked Today</button>
                    </div>
                    <div class="last-cooked">${lastCookedText}</div>
                </div>

                <div style="margin-bottom: 24px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <h3 style="font-size: 18px; font-weight: 600;">💬 Comments</h3>
                    </div>
                    <div style="margin-bottom: 12px;">
                        <textarea id="newComment" placeholder="Add a comment or note..." style="width: 100%; padding: 12px; border: 2px solid #EEEEEE; border-radius: 8px; font-family: 'Poppins', sans-serif; resize: vertical; min-height: 80px;"></textarea>
                        <button class="btn-primary" style="margin-top: 8px;" onclick="addComment('${recipe.id}')">Add Comment</button>
                    </div>
                    <div id="commentsList">
                        ${recipe.comments && recipe.comments.length > 0 ? recipe.comments.map((comment, idx) => `
                            <div class="comment-item">
                                <div style="display: flex; justify-content: space-between; align-items: start;">
                                    <div style="flex: 1;">${comment.text}</div>
                                    <button class="btn-danger" style="margin-left: 8px; padding: 4px 8px; font-size: 12px;" onclick="deleteComment('${recipe.id}', ${idx})">Delete</button>
                                </div>
                                <div class="comment-date">${new Date(comment.date).toLocaleString()}</div>
                            </div>
                        `).join(``) : `<p style="color: #999; text-align: center; padding: 20px;">No comments yet</p>`}
                    </div>
                </div>

                <div style="display: flex; gap: 12px;">
                    <button class="btn-secondary" onclick="editRecipe('${recipe.id}'); closeViewModal()">Edit Recipe</button>
                    <button class="btn-danger" onclick="deleteRecipe('${recipe.id}'); closeViewModal()">Delete Recipe</button>
                    <button class="btn-secondary" onclick="closeViewModal()" style="margin-left: auto;">Close</button>
                </div>
            `;

            document.getElementById(`viewContent`).innerHTML = html;
            document.getElementById(`viewModal`).classList.add(`active`);
        }

        function addComment(recipeId) {
            const commentText = document.getElementById(`newComment`).value.trim();
            if (!commentText) return;

            const recipe = recipes.find(r => r.id === recipeId);
            if (recipe) {
                if (!recipe.comments) recipe.comments = [];
                recipe.comments.push({
                    text: commentText,
                    date: new Date().toISOString()
                });
                saveToLocalStorage();
                viewRecipe(recipeId);
            }
        }

        function deleteComment(recipeId, commentIndex) {
            if (!confirm(`Delete this comment?`)) return;
            const recipe = recipes.find(r => r.id === recipeId);
            if (recipe && recipe.comments) {
                recipe.comments.splice(commentIndex, 1);
                saveToLocalStorage();
                viewRecipe(recipeId);
            }
        }

        function filterRecipes(cuisine) {
            currentFilter = cuisine;
            document.querySelectorAll(`.filter-btn`).forEach(btn => {
                btn.classList.remove(`active`);
            });
            event.target.classList.add(`active`);
            renderRecipes();
        }

        function renderRecipes() {
            const grid = document.getElementById(`recipeGrid`);
            let filteredRecipes = currentFilter === `all` 
                ? recipes 
                : recipes.filter(r => r.cuisine === currentFilter);

            if (filteredRecipes.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <h3 style="font-size: 20px; font-weight: 600; margin-bottom: 8px;">No recipes found</h3>
                        <p style="font-size: 14px;">Start by adding your first recipe!</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredRecipes.map(recipe => {
                const totalTime = recipe.prepTime + recipe.cookTime;
                const lastCookedText = recipe.lastCooked 
                    ? `Last cooked: ${new Date(recipe.lastCooked).toLocaleDateString()}`
                    : `Never cooked`;

                return `
                    <div class="recipe-card">
                        ${recipe.imageUrl 
                            ? `<img src="${recipe.imageUrl}" class="recipe-image" alt="${recipe.name}">` 
                            : `<div class="recipe-image" style="display: flex; align-items: center; justify-content: center; font-size: 48px;">🍽️</div>`
                        }
                        <div style="padding: 20px; flex: 1; display: flex; flex-direction: column;">
                            <h3 style="font-size: 20px; font-weight: 600; margin-bottom: 8px;">${recipe.name}</h3>
                            <span class="cuisine-badge cuisine-${recipe.cuisine.toLowerCase()}">${recipe.cuisine}</span>
                            
                            <div style="display: flex; gap: 16px; margin: 12px 0; font-size: 13px; color: #666;">
                                <span>⏱️ ${totalTime} min</span>
                                <span>🍽️ ${recipe.servings} servings</span>
                            </div>

                            <div style="font-size: 12px; color: #666; margin-bottom: 8px;">
                                ${lastCookedText}
                            </div>

                            ${recipe.comments && recipe.comments.length > 0 ? `
                                <div style="font-size: 12px; color: #666; margin-bottom: 12px;">
                                    💬 ${recipe.comments.length} comment${recipe.comments.length > 1 ? `s` : ``}
                                </div>
                            ` : ``}

                            <div style="display: flex; gap: 8px; margin-top: auto;">
                                <button class="btn-secondary" onclick="viewRecipe('${recipe.id}')" style="flex: 1;">View</button>
                                <button class="btn-secondary" onclick="editRecipe('${recipe.id}')">Edit</button>
                                <button class="btn-danger" onclick="deleteRecipe('${recipe.id}')">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join(``);
        }

        renderRecipes();
    </script>
    <script src="./My Recipe Collection - Kuse AI_files/sdk.prd.js.download"></script>
